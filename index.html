<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Track your workouts and build strength" />

    <!-- iOS Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Workout Tracker" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/icon-192.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg" />

    <title>Workout Tracker</title>
    <script>
      // ── Service Worker management ─────────────────────────────
      // BUILD_VERSION is bumped on every deploy where we want clients to
      // get fresh assets immediately (e.g. CSS/JSX changes that the SW's
      // existing revision tracking missed). When localStorage's stored
      // version differs from this, we unregister the SW + clear caches
      // once, then reload. Subsequent loads use the new SW normally.
      var BUILD_VERSION = '2026-05-14-c';
      if ('serviceWorker' in navigator) {
        var isTvPath = window.location.pathname.startsWith('/tv');
        var stored = '';
        try { stored = localStorage.getItem('bsa_sw_build') || ''; } catch (e) {}
        var needsBust = isTvPath || stored !== BUILD_VERSION;

        if (needsBust) {
          // Nuclear option: unregister all SWs + clear all caches.
          // Used unconditionally on /tv, and once per build elsewhere.
          // Safari was caching sw.js for hours; this guarantees a fresh
          // bundle on the next reload.
          try { localStorage.setItem('bsa_sw_build', BUILD_VERSION); } catch (e) {}
          Promise.all([
            navigator.serviceWorker.getRegistrations().then(function(rs) {
              return Promise.all(rs.map(function(r) { return r.unregister(); }));
            }),
            'caches' in window
              ? caches.keys().then(function(names) {
                  return Promise.all(names.map(function(n) { return caches.delete(n); }));
                })
              : Promise.resolve()
          ]).then(function() {
            // Only reload outside /tv (which doesn't need a reload — the
            // /tv flow is single-shot and already fetched fresh assets).
            if (!isTvPath) window.location.reload();
          });
        } else {
          // Steady-state: ping for new SW updates; activate any waiting
          // worker immediately; reload once when the controller swaps.
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            registrations.forEach(function(reg) {
              reg.update();
              if (reg.waiting) {
                reg.waiting.postMessage({ type: 'SKIP_WAITING' });
              }
              reg.addEventListener('updatefound', function() {
                var newWorker = reg.installing;
                if (newWorker) {
                  newWorker.addEventListener('statechange', function() {
                    if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                      newWorker.postMessage({ type: 'SKIP_WAITING' });
                    }
                  });
                }
              });
            });
          });
          var refreshing = false;
          navigator.serviceWorker.addEventListener('controllerchange', function() {
            if (!refreshing) {
              refreshing = true;
              window.location.reload();
            }
          });
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
